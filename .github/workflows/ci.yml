name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A second push to the same branch cancels the first: a superseded run tells you nothing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore backend/TechStorePro.slnx

      # Warnings are errors in CI. A warning nobody fails on is a warning nobody reads, and the
      # EF-version conflict that took an afternoon to diagnose announced itself as one.
      - name: Build
        run: dotnet build backend/TechStorePro.slnx --no-restore --configuration Release -warnaserror

      - name: Format
        run: dotnet format backend/TechStorePro.slnx --verify-no-changes --no-restore

      # The cross-tenant isolation tests spin up a real PostgreSQL through Testcontainers, which
      # needs a Docker daemon. It is present on ubuntu-latest runners by default.
      - name: Test
        run: dotnet test backend/TechStorePro.slnx --no-build --configuration Release --logger "console;verbosity=normal"

      # A model change without a migration builds and tests green, then fails on deploy against a
      # schema that does not match. Catching it here costs seconds.
      - name: Check for a model change with no migration
        run: |
          dotnet tool restore
          dotnet ef migrations has-pending-model-changes \
            --project backend/src/TechStorePro.Infrastructure \
            --startup-project backend/src/TechStorePro.API

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` and not `npm install`: it installs exactly the lockfile, and fails if
      # package.json and the lockfile disagree — which is the bug you want to hear about.
      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # `next build` runs TypeScript, so this covers typechecking too.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5199
